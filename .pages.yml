media:
  input: assets
  output: /assets

content:
  - name: website
    label: Website
    type: file
    path: index.html

  - name: images
    label: Photos
    type: collection
    path: assets/images
    filename: "{primary}.md"
    fields:
      - name: primary
        label: Name
        type: string
      - name: image
        label: Photo
        type: image

  - name: videos
    label: Videos
    type: collection
    path: assets/videos
    filename: "{primary}.md"
    fields:
      - name: primary
        label: Title
        type: string
      - name: video
        label: Video
        type: file