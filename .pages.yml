media:
  input: assets
  output: /assets

content:
  - name: site
    label: Site Settings
    type: file
    path: content/site.json
    fields:
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Tagline
        type: string
      - name: about
        label: About
        type: text
      - name: email
        label: Email
        type: string

  - name: edits
    label: Edits
    type: collection
    path: content/edits
    filename: "{primary}.md"
    fields:
      - name: primary
        label: Title
        type: string
      - name: video
        label: Video
        type: file
      - name: cover
        label: Cover Image
        type: image
      - name: description
        label: Description
        type: text

  - name: gallery
    label: Gallery
    type: collection
    path: content/gallery
    filename: "{primary}.md"
    fields:
      - name: primary
        label: Title
        type: string
      - name: image
        label: Photo
        type: image
      - name: caption
        label: Caption
        type: text